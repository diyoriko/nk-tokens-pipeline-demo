name: publish-tokens

# Publishes the @diyoriko/nk-tokens package to GitHub Packages when a version
# tag is pushed (e.g. `git tag v0.2.0 && git push --tags`). The package version
# is taken from the tag. Consumers then `npm i @diyoriko/nk-tokens`.

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@diyoriko'
          cache: npm

      - run: npm ci

      - run: npm run build:tokens # generate build/{css,dart,ts}

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
