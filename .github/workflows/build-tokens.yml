name: build-tokens

# Demo CI: when Tokens Studio pushes an updated token file, rebuild the
# generated outputs and publish them as a downloadable artifact.
#
# Production CI for parent-mf (Bitbucket) is a SEPARATE concern — not here.

on:
  push:
    paths:
      - 'tokens/**'
      - 'style-dictionary.config.mjs'
      - 'build-tokens.mjs'
      - 'package.json'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build tokens
        run: npm run build:tokens

      - name: Upload generated outputs
        uses: actions/upload-artifact@v4
        with:
          name: nk-tokens-build
          path: build/
          if-no-files-found: error

  # --- Optional: commit build/ back to the repo instead of (or as well as)
  # --- uploading an artifact. Disabled by default — flip `if` to enable, and
  # --- remove `build/` from .gitignore so the outputs are tracked.
  commit-back:
    if: false
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:tokens
      - name: Commit generated outputs
        run: |
          git config user.name  "tokens-bot"
          git config user.email "tokens-bot@users.noreply.github.com"
          git add -f build/
          git diff --cached --quiet || git commit -m "chore(tokens): rebuild generated outputs"
          git push
